<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="container">
        <header>
            <img src="images/logo-1.jpg" alt="JCCC">
            <h2>Contact Us</h2>
            <p>We'd love to hear from you! Please fill out the form below.</p>
        </header>
        <main>
        <form method="post" action="https://webdevbasics.net/scripts/demo.php">
        <div>
            <div class="form-group">
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="firstname" placeholder="Your first name..." required>
            </div>

            <div class="form-group">
                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="lastname" placeholder="Your last name..." required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email..." required>
            </div>

            <div class="form-group"></div>
                <label for="phone">First Name</label>
                <input type="tel" id="phone" name="phone" placeholder="123-456-7890" required>
            </div>

            <div class="form-group">
                <label>How would you prefer we contact you?</label>
                <div class="contact-options">
                    <input type="radio" id="contactEmail" name="contactPreference" value="email" required>
                    <label for="contactEmail">Email</label>
                    <input type="radio" id="contactPhone" name="contactPreference" value="phone">
                    <label for="contactPhone">Phone</label>
                    <input type="radio" id="noPreference" name="contactPreference" value="no_preference">
                    <label for="noPreference">No Preference</label>
            </div>
        </div>
        <div class="form-group">
          <button type="submit">Submit</button>
        </div>
        </form>

        </main>
        <footer>
         <p>&copy; Vivian Monsivaiz. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
